<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>엄갱딸기: 잔소리 소나기 롱버전</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; font-family: 'Noto Sans KR', sans-serif; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1015; color: #fff; }
    body { display: flex; justify-content: center; align-items: center; }
    #game-container { position: relative; width: 100%; max-width: 420px; height: 100vh; max-height: 760px; background: radial-gradient(circle at 50% 22%, #242435 0%, #16161e 52%, #0e0e13 100%); overflow: hidden; border: 2px solid #3d3e4f; border-radius: 14px; box-shadow: 0 20px 44px rgba(0,0,0,0.55), inset 0 0 38px rgba(255,255,255,0.03); }
    canvas { display: block; width: 100%; height: 100%; background: transparent; }
    .screen { position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 28px; text-align: center; background: rgba(16, 16, 22, 0.94); backdrop-filter: blur(6px); }
    .hidden { display: none !important; }
    h1 { font-size: 28px; font-weight: 900; line-height: 1.12; letter-spacing: -1.2px; margin-bottom: 12px; background: linear-gradient(45deg, #ff7b00, #ff4a7d, #2cdcb3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 24px; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
    p { font-size: 14px; color: #b9bac8; line-height: 1.58; margin-bottom: 18px; word-break: keep-all; }
    .btn { width: 100%; padding: 15px; margin: 7px 0; border: none; border-radius: 13px; font-size: 15px; font-weight: 900; cursor: pointer; color: #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .btn-mom { background: linear-gradient(135deg, #ff4a7d, #ff7b00); }
    .btn-daughter { background: linear-gradient(135deg, #2cdcb3, #73f4ff); color: #101116; }
    .btn-retry { background: #343543; }
    .btn-sound { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); color: #dce0f6; }
    #ui-layer { position: absolute; top: 12px; left: 0; width: 100%; z-index: 8; padding: 0 12px; pointer-events: none; }
    .ui-row { display: flex; justify-content: space-between; align-items: center; gap: 7px; margin-bottom: 7px; }
    .pill { padding: 6px 9px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(13, 14, 22, 0.58); color: #f2f4ff; font-size: 12px; font-weight: 800; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,0.25); text-shadow: 0 2px 5px rgba(0,0,0,0.65); }
    .stage-pill { min-width: 110px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
    .bar-wrap { position: relative; height: 13px; border: 1px solid rgba(255,255,255,0.20); border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.07); }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2cdcb3, #ffeb3b, #ff4a7d); box-shadow: 0 0 14px rgba(255,74,125,0.35); transition: width 0.12s linear; }
    .skill-zone { position: absolute; left: 12px; right: 12px; bottom: 14px; z-index: 8; display: grid; grid-template-columns: 1fr 1fr; gap: 9px; pointer-events: auto; }
    .skill-btn { padding: 13px 10px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.16); background: rgba(20, 21, 30, 0.76); color: #dfe4ff; font-size: 13px; font-weight: 900; box-shadow: 0 8px 22px rgba(0,0,0,0.35); }
    .skill-btn.ready { border-color: rgba(255, 235, 59, 0.9); background: linear-gradient(135deg, rgba(255,235,59,0.18), rgba(255,74,125,0.16)); color: #fff; box-shadow: 0 0 18px rgba(255,235,59,0.18); }
    .alert { position: absolute; left: 0; width: 100%; z-index: 12; text-align: center; pointer-events: none; display: none; padding: 0 18px; font-weight: 900; text-shadow: 0 3px 10px rgba(0,0,0,0.75); animation: popAlert 0.5s ease-out; }
    #stage-alert { top: 30%; font-size: 23px; color: #ffeb3b; }
    #combo-alert { top: 22%; font-size: 21px; color: #00ff9d; }
    #warning-alert { top: 42%; font-size: 24px; color: #ff4a7d; }
    @keyframes popAlert { 0% { transform: scale(0.7); opacity: 0; } 70% { transform: scale(1.08); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    .visual-result { font-size: 46px; margin: 18px 0; letter-spacing: 5px; background: rgba(255,255,255,0.06); padding: 15px; border-radius: 18px; width: 100%; border: 1px solid rgba(255,255,255,0.08); }
    .mini-note { font-size: 12px; color: #8d91a5; margin-top: 8px; }
    @media (max-height: 650px) { h1 { font-size: 24px; } p { font-size: 13px; margin-bottom: 14px; } .btn { padding: 12px; } .visual-result { font-size: 38px; margin: 12px 0; } .skill-btn { padding: 10px 8px; font-size: 12px; } }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-layer">
    <div class="ui-row">
      <div class="pill">STAGE <span id="txt-stage">1</span></div>
      <div class="pill stage-pill" id="txt-stage-name">등교 전쟁</div>
      <div class="pill"><span id="txt-hp">❤️❤️❤️❤️</span></div>
      <div class="pill">SCORE <span id="txt-score">0</span></div>
    </div>
    <div class="ui-row">
      <div class="pill">COMBO x<span id="txt-combo">0</span></div>
      <div class="pill">WAVE <span id="txt-wave">0</span></div>
      <div class="pill">TIME <span id="txt-time">0:00</span></div>
    </div>
    <div class="bar-wrap"><div id="gauge-fill" class="bar-fill"></div></div>
  </div>
  <div id="stage-alert" class="alert"></div><div id="combo-alert" class="alert"></div><div id="warning-alert" class="alert"></div>
  <div class="skill-zone"><button id="skill-btn" class="skill-btn">참기 게이지 0%</button><button id="sound-btn" class="skill-btn">🔇 SOUND OFF</button></div>
  <div id="screen-start" class="screen">
    <h1>엄갱딸기<br>잔소리 소나기</h1>
    <p>엄마와 딸의 말풍선이 계속 쏟아집니다.<br>좌우로 움직이며 말풍선을 막고, 게이지가 차면 한 번에 정리하세요.</p>
    <button class="btn btn-mom" onclick="startGame('MOM')">[ 엄마 모드: 오늘도 참는다 👋 ]</button>
    <button class="btn btn-daughter" onclick="startGame('DAUGHTER')">[ 딸 모드: 오늘도 버틴다 🌵 ]</button>
    <button class="btn btn-sound" onclick="toggleSound()">🔊 소리 켜기 / 끄기</button>
    <div class="mini-note">자동 발사 · 긴 스테이지 · 잔소리 폭풍 · 시원한 효과음</div>
  </div>
  <div id="screen-end" class="screen hidden">
    <h2 id="end-title">오늘도 살아남음</h2><div id="end-visual" class="visual-result">👩💬👧</div><p id="end-desc">잔소리 소나기를 통과했습니다.</p>
    <button class="btn btn-retry" onclick="resetGame()">다시 한판 버티기</button><button class="btn btn-sound" onclick="showStart()">모드 다시 선택</button>
  </div>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),container=document.getElementById('game-container');let W=360,H=640;function resizeCanvas(){const r=container.getBoundingClientRect(),dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));W=r.width;H=r.height;canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}window.addEventListener('resize',resizeCanvas);resizeCanvas();
const MOM_WORDS=['공부해라','밥먹어라','폰 그만','방치워라','일찍자라','숙제했니','씻어라','불꺼라','학원가라','말대꾸?','문 열어','대답해','춥게 입지마','늦지마','또 누워?','정리해'];
const DAUGHTER_WORDS=['몰라요','안먹어','나중에','귀찮아','왜요?','그만해요','제발요','알아서해요','싫어요','방해금지','나가요','됐거든','또 시작','내일할게','진짜?','아 몰라'];
const MIXED_WORDS=['왜?','또?','빨리','잠깐','아니','됐어','뭐?','지금?','진짜?','제발','알았어','몰라'];
const STAGES=[{name:'등교 전쟁',score:0,speed:1.55,spawn:58,burst:false,boss:false},{name:'식탁 대치',score:220,speed:1.9,spawn:50,burst:false,boss:false},{name:'폰 전쟁',score:520,speed:2.25,spawn:42,burst:true,boss:false},{name:'방 문 앞 공방',score:900,speed:2.55,spawn:36,burst:true,boss:false},{name:'잔소리 소나기',score:1350,speed:2.85,spawn:30,burst:true,boss:false},{name:'감정 폭주',score:1900,speed:3.15,spawn:26,burst:true,boss:false},{name:'보스전',score:2600,speed:3.0,spawn:36,burst:true,boss:true}];
let gameMode='MOM',isPlaying=false,score=0,hp=4,stageIndex=0,combo=0,comboTimer=0,wave=0,elapsed=0,frameCount=0,skillGauge=0,slowTime=0,clearPulse=0,shake=0,flash=0,boss=null;let player={x:180,y:560},bullets=[],enemies=[],particles=[],floatTexts=[],bgDots=[];for(let i=0;i<80;i++)bgDots.push({x:Math.random(),y:Math.random(),s:Math.random()>.85?2:1,a:Math.random()*.35+.1});
let audioCtx=null,soundOn=false,lastPew=0;function initAudio(){if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;audioCtx=new AC()}if(audioCtx.state==='suspended')audioCtx.resume()}function toggleSound(){initAudio();soundOn=!soundOn;updateSoundButton();if(soundOn)playSfx('ready')}function updateSoundButton(){const b=document.getElementById('sound-btn');b.innerText=soundOn?'🔊 SOUND ON':'🔇 SOUND OFF';b.classList.toggle('ready',soundOn)}function tone(f,d,t='sine',g=0.035,slide=null){if(!soundOn||!audioCtx)return;const n=audioCtx.currentTime,o=audioCtx.createOscillator(),ga=audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,n);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(25,slide),n+d);ga.gain.setValueAtTime(.0001,n);ga.gain.exponentialRampToValueAtTime(g,n+.012);ga.gain.exponentialRampToValueAtTime(.0001,n+d);o.connect(ga);ga.connect(audioCtx.destination);o.start(n);o.stop(n+d+.02)}function noise(d=.08,g=.03,ff=1200){if(!soundOn||!audioCtx)return;const n=audioCtx.currentTime,l=Math.max(1,Math.floor(audioCtx.sampleRate*d)),buf=audioCtx.createBuffer(1,l,audioCtx.sampleRate),data=buf.getChannelData(0);for(let i=0;i<l;i++)data[i]=(Math.random()*2-1)*(1-i/l);const src=audioCtx.createBufferSource(),filter=audioCtx.createBiquadFilter(),ga=audioCtx.createGain();filter.type='bandpass';filter.frequency.value=ff;filter.Q.value=.95;ga.gain.setValueAtTime(g,n);ga.gain.exponentialRampToValueAtTime(.0001,n+d);src.buffer=buf;src.connect(filter);filter.connect(ga);ga.connect(audioCtx.destination);src.start(n);src.stop(n+d)}function playSfx(name){if(!soundOn||!audioCtx)return;if(name==='pew'){const now=performance.now();if(now-lastPew<80)return;lastPew=now;tone(gameMode==='MOM'?520:760,.05,'square',.018,gameMode==='MOM'?760:520);return}if(name==='pop'){tone(720,.07,'triangle',.036,1180);noise(.045,.012,2600);return}if(name==='hit'){tone(200,.08,'sawtooth',.03,120);noise(.08,.025,700);return}if(name==='combo'){tone(880,.07,'triangle',.04,1320);setTimeout(()=>tone(1175,.07,'triangle',.035,1568),60);return}if(name==='skill'){tone(180,.22,'sawtooth',.045,740);noise(.18,.045,1800);setTimeout(()=>tone(1046,.18,'triangle',.04),110);return}if(name==='stage'){tone(392,.09,'triangle',.035);setTimeout(()=>tone(587,.1,'triangle',.035),90);setTimeout(()=>tone(784,.16,'triangle',.04),180);return}if(name==='boss'){tone(120,.34,'sawtooth',.05,70);noise(.28,.04,480);return}if(name==='clear'){tone(523,.1,'triangle',.045);setTimeout(()=>tone(659,.1,'triangle',.045),90);setTimeout(()=>tone(1046,.22,'triangle',.05),180);return}if(name==='fail'){tone(220,.24,'sawtooth',.04,110);return}if(name==='ready')tone(440,.06,'triangle',.03,660)}
function movePlayer(clientX){if(!isPlaying)return;const r=canvas.getBoundingClientRect();player.x=clientX-r.left;player.x=Math.max(24,Math.min(W-24,player.x))}window.addEventListener('mousemove',e=>movePlayer(e.clientX));window.addEventListener('touchmove',e=>{if(e.touches.length>0)movePlayer(e.touches[0].clientX)},{passive:false});window.addEventListener('keydown',e=>{if(e.code==='Space')useSkill()});document.getElementById('skill-btn').addEventListener('pointerdown',e=>{e.preventDefault();useSkill()});document.getElementById('sound-btn').addEventListener('pointerdown',e=>{e.preventDefault();toggleSound()});
function startGame(mode){initAudio();gameMode=mode;document.getElementById('screen-start').classList.add('hidden');document.getElementById('screen-end').classList.add('hidden');score=0;hp=4;stageIndex=0;combo=0;comboTimer=0;wave=0;elapsed=0;frameCount=0;skillGauge=0;slowTime=0;clearPulse=0;shake=0;flash=0;boss=null;bullets=[];enemies=[];particles=[];floatTexts=[];player.x=W/2;player.y=H-120;isPlaying=true;showAlert('stage','STAGE 1: 등교 전쟁 🏃‍♀️',1400);playSfx('stage');requestAnimationFrame(animate)}function resetGame(){document.getElementById('screen-end').classList.add('hidden');startGame(gameMode)}function showStart(){isPlaying=false;document.getElementById('screen-end').classList.add('hidden');document.getElementById('screen-start').classList.remove('hidden')}function showAlert(type,text,duration=1200){const el=document.getElementById(type+'-alert');el.innerHTML=text;el.style.display='block';clearTimeout(el._timer);el._timer=setTimeout(()=>el.style.display='none',duration)}function currentStage(){return STAGES[stageIndex]||STAGES[STAGES.length-1]}function checkStageProgress(){if(boss)return;let next=stageIndex+1;if(next<STAGES.length&&score>=STAGES[next].score){stageIndex=next;const st=currentStage();showAlert('stage',`STAGE ${stageIndex+1}: ${st.name} ${st.boss?'⚠️':'💬'}`,st.boss?1800:1300);playSfx(st.boss?'boss':'stage');clearPulse=.45;if(st.boss)spawnBoss()}}function spawnBoss(){enemies=[];bullets=[];boss={x:W/2,y:110,hp:110,maxHp:110,direction:1,mood:0,text:gameMode==='MOM'?'🛌 닫힌 이불왕국':'🚪 닫힌 방문왕국'};showAlert('warning','⚠️ 최종 감정 보스 출현 ⚠️',2200)}
function pickWord(sp){if(sp==='MOM')return MOM_WORDS[Math.floor(Math.random()*MOM_WORDS.length)];if(sp==='DAUGHTER')return DAUGHTER_WORDS[Math.floor(Math.random()*DAUGHTER_WORDS.length)];return MIXED_WORDS[Math.floor(Math.random()*MIXED_WORDS.length)]}function chooseSpeaker(){const r=Math.random();if(stageIndex>=4){if(r<.43)return'MOM';if(r<.86)return'DAUGHTER';return'MIXED'}if(gameMode==='MOM'){if(r<.70)return'DAUGHTER';if(r<.90)return'MOM';return'MIXED'}else{if(r<.70)return'MOM';if(r<.90)return'DAUGHTER';return'MIXED'}}function spawnEnemy(force=null){const st=currentStage(),speaker=force||chooseSpeaker(),text=pickWord(speaker),heavy=Math.random()<Math.min(.28,.06+stageIndex*.035),width=Math.max(58,text.length*15+26),x=Math.random()*(W-width-24)+width/2+12;enemies.push({x,y:-30,text,speaker,width,height:heavy?36:31,hp:heavy?2:1,maxHp:heavy?2:1,speed:st.speed+Math.random()*.45+(heavy?-.2:0),wobble:Math.random()*Math.PI*2,heavy,split:st.burst&&Math.random()<.18})}function fireBullet(){const emoji=gameMode==='MOM'?'👋':'🌵';bullets.push({x:player.x,y:player.y-24,vy:-9.4,emoji,size:23,pierce:slowTime>0?1:0});playSfx('pew')}
function useSkill(){if(!isPlaying||skillGauge<100){showAlert('combo','참기 게이지 부족!',650);return}skillGauge=0;slowTime=4.2;clearPulse=.75;flash=.38;shake=14;playSfx('skill');showAlert('combo',gameMode==='MOM'?'엄마의 깊은 한숨: 말풍선 정리!':'딸의 무음모드: 잔소리 정지!',1500);let removed=0;for(let i=enemies.length-1;i>=0;i--){if(enemies[i].y<H-150||removed<8){createBurst(enemies[i].x,enemies[i].y,enemies[i].speaker,16);enemies.splice(i,1);removed++;score+=8}}if(boss){boss.hp-=15;createBurst(boss.x,boss.y,'MIXED',30);addFloatText(boss.x,boss.y-30,'-15 진정','#ffeb3b');if(boss.hp<=0)gameClear()}}function decreaseHp(){hp--;shake=10;flash=.18;combo=0;comboTimer=0;playSfx('hit');if(hp===1)showAlert('warning',gameMode==='MOM'?'뒷목 잡기 직전! 혈압 경보 🚨':'방문 잠금 충동 95% 돌파 🚪',2000);if(hp<=0)gameOver()}
function createBurst(x,y,speaker,count=10){const color=speaker==='MOM'?'#ff4a7d':speaker==='DAUGHTER'?'#2cdcb3':'#ffeb3b';for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:.75+Math.random()*.35,maxLife:1,size:2+Math.random()*4,color})}function addFloatText(x,y,text,color='#fff'){floatTexts.push({x,y,text,color,life:1})}function drawRoundedRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}function formatTime(sec){sec=Math.floor(sec);return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`}function updateUI(){document.getElementById('txt-stage').innerText=boss?'BOSS':stageIndex+1;document.getElementById('txt-stage-name').innerText=currentStage().name;document.getElementById('txt-score').innerText=score;document.getElementById('txt-combo').innerText=combo;document.getElementById('txt-wave').innerText=wave;document.getElementById('txt-time').innerText=formatTime(elapsed);document.getElementById('txt-hp').innerText=Array.from({length:4},(_,i)=>i<hp?'❤️':'🤍').join('');document.getElementById('gauge-fill').style.width=Math.min(100,skillGauge)+'%';const b=document.getElementById('skill-btn');if(skillGauge>=100){b.innerText=gameMode==='MOM'?'엄마 한숨 READY':'무음모드 READY';b.classList.add('ready')}else{b.innerText=`참기 게이지 ${Math.floor(skillGauge)}%`;b.classList.remove('ready')}}
function animate(){if(!isPlaying)return;frameCount++;elapsed+=1/60;if(comboTimer>0){comboTimer-=1/60;if(comboTimer<=0)combo=0}if(slowTime>0)slowTime-=1/60;if(clearPulse>0)clearPulse-=1/60;if(shake>0)shake*=.88;if(flash>0)flash-=1/60;const st=currentStage();let spawnRate=Math.max(18,st.spawn-Math.floor(elapsed/40));if(slowTime>0)spawnRate+=20;if(!boss&&frameCount%spawnRate===0){spawnEnemy();wave++;if(st.burst&&Math.random()<.35)spawnEnemy(gameMode==='MOM'?'MOM':'DAUGHTER')}if(boss&&frameCount%Math.max(28,st.spawn)===0)spawnEnemy(Math.random()<.5?'MOM':'DAUGHTER');if(frameCount%9===0)fireBullet();checkStageProgress();updateGameObjects();drawGame();updateUI();requestAnimationFrame(animate)}
function updateGameObjects(){for(let i=bullets.length-1;i>=0;i--){bullets[i].y+=bullets[i].vy;if(bullets[i].y<-40)bullets.splice(i,1)}const speedMul=slowTime>0?.34:1;for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.wobble+=.045;e.y+=e.speed*speedMul;e.x+=Math.sin(e.wobble)*(e.heavy?.35:.7);for(let j=bullets.length-1;j>=0;j--){const b=bullets[j];if(Math.abs(b.x-e.x)<e.width/2&&Math.abs(b.y-e.y)<e.height/2+6){e.hp--;if(b.pierce>0)b.pierce--;else bullets.splice(j,1);createBurst(e.x,e.y,e.speaker,e.heavy?12:8);if(e.hp<=0){playSfx('pop');score+=e.heavy?18:10;combo++;comboTimer=1.55;skillGauge=Math.min(100,skillGauge+(e.heavy?5:3));addFloatText(e.x,e.y,'+'+(e.heavy?18:10),e.speaker==='MOM'?'#ff4a7d':'#2cdcb3');if(combo%8===0){showAlert('combo',gameMode==='MOM'?`등짝 말고 말풍선 정리! x${combo}`:`가시 말고 침착 방어! x${combo}`,900);playSfx('combo');skillGauge=Math.min(100,skillGauge+8)}if(e.split&&enemies.length<28){const miniText=e.speaker==='MOM'?'또?':'왜?';for(let k=0;k<2;k++)enemies.push({x:e.x+(Math.random()-.5)*48,y:e.y+(Math.random()-.5)*24,text:miniText,speaker:e.speaker,width:48,height:26,hp:1,maxHp:1,speed:e.speed+.25,wobble:Math.random()*Math.PI*2,heavy:false,split:false})}enemies.splice(i,1)}break}}if(enemies[i]&&e.y>H-110){enemies.splice(i,1);decreaseHp()}}if(boss){boss.x+=boss.direction*1.55;if(boss.x<78||boss.x>W-78)boss.direction*=-1;boss.mood+=.05;for(let j=bullets.length-1;j>=0;j--){const b=bullets[j];if(Math.abs(b.x-boss.x)<58&&Math.abs(b.y-boss.y)<42){bullets.splice(j,1);boss.hp--;skillGauge=Math.min(100,skillGauge+1.2);createBurst(boss.x+(Math.random()-.5)*70,boss.y+(Math.random()-.5)*34,'MIXED',3);if(boss.hp%20===0){shake=8;playSfx('hit');showAlert('warning',boss.hp>0?'보스가 더 시끄러워집니다!':'보스 침묵!',1000)}if(boss.hp<=0)gameClear()}}}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.94;p.vy*=.94;p.life-=.025;if(p.life<=0)particles.splice(i,1)}for(let i=floatTexts.length-1;i>=0;i--){const f=floatTexts[i];f.y-=.8;f.life-=.018;if(f.life<=0)floatTexts.splice(i,1)}}
function drawGame(){let ox=0,oy=0;if(shake>.3){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake}ctx.save();ctx.translate(ox,oy);ctx.clearRect(-20,-20,W+40,H+40);drawBackground();drawPlayer();drawBullets();drawEnemies();if(boss)drawBoss();drawParticles();drawFloatTexts();if(clearPulse>0){ctx.globalAlpha=Math.min(.55,clearPulse);const g=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,Math.max(W,H)*.7);g.addColorStop(0,'rgba(255,235,59,0)');g.addColorStop(.6,'rgba(44,220,179,0.20)');g.addColorStop(1,'rgba(255,74,125,0.32)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}ctx.restore();if(flash>0){ctx.globalAlpha=Math.max(0,Math.min(.55,flash));ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}}
function drawBackground(){const bg=ctx.createRadialGradient(W/2,H*.2,10,W/2,H*.48,H*.8);bg.addColorStop(0,gameMode==='MOM'?'#30202a':'#15302c');bg.addColorStop(.55,'#171820');bg.addColorStop(1,'#0d0d12');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);for(const d of bgDots){ctx.globalAlpha=d.a;ctx.fillStyle='#fff';ctx.fillRect(d.x*W,((d.y*H+elapsed*8)%H),d.s,d.s)}ctx.globalAlpha=1;ctx.globalAlpha=.06;ctx.fillStyle=gameMode==='MOM'?'#ff4a7d':'#2cdcb3';for(let i=0;i<6;i++){const y=(elapsed*(18+i*3)+i*93)%H;ctx.fillRect(i*76-20,y,62,8)}ctx.globalAlpha=1}function drawPlayer(){ctx.save();const aura=ctx.createRadialGradient(player.x,player.y,4,player.x,player.y,45);if(gameMode==='MOM'){aura.addColorStop(0,'rgba(255, 74, 125, .9)');aura.addColorStop(.5,'rgba(255, 123, 0, .42)');aura.addColorStop(1,'rgba(255, 0, 0, 0)')}else{aura.addColorStop(0,'rgba(44, 220, 179, .9)');aura.addColorStop(.5,'rgba(115, 244, 255, .42)');aura.addColorStop(1,'rgba(0, 0, 255, 0)')}ctx.fillStyle=aura;ctx.beginPath();ctx.arc(player.x,player.y,45,0,Math.PI*2);ctx.fill();ctx.font='38px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(gameMode==='MOM'?'🥵':'🥶',player.x,player.y);ctx.restore()}function drawBullets(){ctx.font='23px Arial';ctx.textAlign='center';ctx.textBaseline='middle';for(const b of bullets){ctx.globalAlpha=.35;ctx.fillStyle=gameMode==='MOM'?'#ffeb3b':'#73f4ff';ctx.beginPath();ctx.arc(b.x,b.y+5,13,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillText(b.emoji,b.x,b.y)}}function drawEnemies(){for(const e of enemies){const isMom=e.speaker==='MOM',isD=e.speaker==='DAUGHTER',stroke=isMom?'#ff4a7d':isD?'#2cdcb3':'#ffeb3b',fill=isMom?'rgba(255,74,125,.16)':isD?'rgba(44,220,179,.16)':'rgba(255,235,59,.14)',x=e.x-e.width/2,y=e.y-e.height/2;ctx.save();ctx.globalAlpha=slowTime>0?.76:1;ctx.fillStyle=isMom?'rgba(255,74,125,.11)':isD?'rgba(44,220,179,.11)':'rgba(255,235,59,.10)';drawRoundedRect(x-5,y-5,e.width+10,e.height+10,12);ctx.fill();drawRoundedRect(x,y,e.width,e.height,10);ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=e.heavy?2.5:1.8;ctx.stroke();if(e.heavy){ctx.fillStyle=stroke;ctx.globalAlpha=.22;ctx.fillRect(x+4,y+4,e.width-8,4);ctx.globalAlpha=slowTime>0?.76:1}ctx.fillStyle='#fff';ctx.font="bold 13px 'Noto Sans KR'";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.text,e.x,e.y);ctx.restore()}}function drawBoss(){const hpR=Math.max(0,boss.hp/boss.maxHp);ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(W/2-90,58,180,12);ctx.fillStyle=gameMode==='MOM'?'#ff4a7d':'#2cdcb3';ctx.fillRect(W/2-90,58,180*hpR,12);const wob=Math.sin(boss.mood)*4;ctx.save();ctx.translate(boss.x,boss.y+wob);const g=ctx.createRadialGradient(0,0,8,0,0,90);g.addColorStop(0,'rgba(255,235,59,.18)');g.addColorStop(1,'rgba(255,74,125,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,90,0,Math.PI*2);ctx.fill();ctx.font="bold 22px 'Noto Sans KR'";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText(gameMode==='MOM'?'🛌 닫힌 이불왕국':'🚪 닫힌 방문왕국',0,0);ctx.font='20px Arial';ctx.fillText('💢',-72,-15);ctx.fillText('💬',70,16);ctx.restore()}function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.maxLife);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size)}ctx.globalAlpha=1}function drawFloatTexts(){ctx.textAlign='center';ctx.textBaseline='middle';for(const f of floatTexts){ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle=f.color;ctx.font="bold 15px 'Noto Sans KR'";ctx.fillText(f.text,f.x,f.y)}ctx.globalAlpha=1}
function gameOver(){isPlaying=false;playSfx('fail');document.getElementById('screen-end').classList.remove('hidden');document.getElementById('end-title').innerText='잔소리 소나기 종료';document.getElementById('end-desc').innerHTML=gameMode==='MOM'?`오늘의 엄마 방어력은 여기까지.<br>SCORE ${score} · COMBO x${combo}`:`오늘의 딸 방어력은 여기까지.<br>SCORE ${score} · COMBO x${combo}`;document.getElementById('end-visual').innerHTML=gameMode==='MOM'?'💬💥🤦‍♀️💥💬':'💬💥🙎‍♀️💥💬'}function gameClear(){if(!isPlaying)return;isPlaying=false;playSfx('clear');document.getElementById('screen-end').classList.remove('hidden');document.getElementById('end-title').innerText='오늘도 살아남음!';document.getElementById('end-desc').innerHTML=`잔소리 소나기를 통과했습니다.<br>SCORE ${score} · TIME ${formatTime(elapsed)} · WAVE ${wave}`;document.getElementById('end-visual').innerHTML=gameMode==='MOM'?"<span style='font-size:17px; display:block; color:#ff4a7d; margin-bottom:5px;'>엄마 모드 클리어</span>👩‍🦱✨💬🧹✨👧":"<span style='font-size:17px; display:block; color:#2cdcb3; margin-bottom:5px;'>딸 모드 클리어</span>👧✨🔕💬✨👩"}
updateSoundButton();updateUI();
</script>
