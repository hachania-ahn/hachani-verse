<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>은하 라면 익스프레스: 낭만사우르스 알바단 v2</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 15%, #121230 0%, #04040c 46%, #010105 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      user-select: none;
      touch-action: manipulation;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    }
    canvas {
      width: min(100vw, 450px);
      height: min(100vh, 750px);
      max-width: 450px;
      max-height: 750px;
      border: 3px solid rgba(170, 210, 255, 0.35);
      border-radius: 18px;
      background: #02020b;
      box-shadow: 0 0 34px rgba(0, 200, 255, 0.22), inset 0 0 28px rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="450" height="750"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

let audioCtx = null;
let bgmTimer = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    startBGM();
  }
}

function tone(freq, type='sine', duration=0.12, vol=0.05, slideTo=null) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function noiseHit() {
  if (!audioCtx) return;
  const size = audioCtx.sampleRate * 0.18;
  const buffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < size; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / size);
  const src = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(420, audioCtx.currentTime);
  src.buffer = buffer;
  src.connect(filter);
  filter.connect(audioCtx.destination);
  src.start();
}

function startBGM() {
  const calm = [196, 247, 294, 392, 330, 294, 247, 220];
  let i = 0;
  bgmTimer = setInterval(() => {
    if (!audioCtx) return;
    if (gameState === 'PLAYING') {
      tone(calm[i % calm.length], 'triangle', 0.23, 0.035);
      if (i % 4 === 0) tone(calm[i % calm.length] / 2, 'sine', 0.35, 0.025);
      i++;
    }
    if (gameState === 'ESCAPE') {
      tone(740 + Math.random() * 240, 'sawtooth', 0.06, 0.04);
    }
  }, 210);
}

function soundShoot(){ tone(880, 'square', 0.09, 0.035, 1220); }
function soundItem(){ tone(523, 'sine', 0.08, 0.07); setTimeout(()=>tone(784,'sine',0.12,0.06),70); }
function soundHire(){ tone(392,'triangle',0.08,0.06); setTimeout(()=>tone(523,'triangle',0.10,0.06),90); setTimeout(()=>tone(659,'triangle',0.14,0.05),170); }
function soundNo(){ tone(140,'sawtooth',0.18,0.05,90); }
function soundClear(){ [523,659,784,1046].forEach((f,idx)=>setTimeout(()=>tone(f,'triangle',0.18,0.06),idx*90)); }

const keys = {};
window.addEventListener('keydown', e => {
  initAudio();
  keys[e.code] = true;
  if (e.code === 'Enter') actionEnter();
  if (e.code === 'Space') actionShoot();
  if (e.code === 'KeyA') actionNegotiate();
});
window.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('mousedown', handlePointer);
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  handlePointer(touch);
}, {passive:false});

const STATE = {
  TITLE: 'TITLE', PLAYING: 'PLAYING', SHOP: 'SHOP', ESCAPE: 'ESCAPE', GAMEOVER: 'GAMEOVER', CLEAR: 'CLEAR'
};

let gameState = STATE.TITLE;
let stage = 1;
let maxStage = 5;
let score = 0;
let gold = 300;
let wage = 9800;
let romanceDebt = 0;
let distance = 1000;
let deliveryCombo = 0;
let shopMessage = '';
let shopMessageTimer = 0;
let negotiateCooldown = 0;
let spawnTimer = 0;
let shake = 0;
let dialogue = { text: '', timer: 0 };
let endingLine = '';

const player = {
  x: 195, y: 520, w: 60, h: 92, speed: 6.7,
  stress: 18, hurt: 0, blink: 0
};

const staffTypes = [
  {name:'낭만형', color:'#ff8aa6', stress:0.018, fire:1, line:'별 보고 쏠게요.'},
  {name:'급발진형', color:'#ff5c7a', stress:0.030, fire:2, line:'일단 쏴요!'},
  {name:'차슈형', color:'#ffb74d', stress:0.012, fire:1, line:'간식 있나요?'},
  {name:'철학형', color:'#b39ddb', stress:0.010, fire:1, line:'단무지란 무엇인가.'}
];
let staff = [];
let enemies = [];
let items = [];
let bullets = [];
let particles = [];

const stars = Array.from({length:72}, () => ({
  x: Math.random()*W, y: Math.random()*H, s: Math.random()*1.8+0.7, v: Math.random()*1.6+0.4, a: Math.random()*0.6+0.35
}));

const buttons = {
  left: {x:20,y:680,w:94,h:48,label:'◀'},
  right:{x:120,y:680,w:94,h:48,label:'▶'},
  shoot:{x:220,y:680,w:92,h:48,label:'단무지'},
  nego:{x:320,y:680,w:110,h:48,label:'협상'}
};

function say(text, time=70) {
  dialogue.text = text;
  dialogue.timer = time;
}

function actionEnter() {
  if (gameState === STATE.TITLE) startGame();
  else if (gameState === STATE.SHOP) startStage();
  else if (gameState === STATE.GAMEOVER || gameState === STATE.CLEAR) resetGame();
}

function startGame() {
  stage = 1;
  score = 0;
  gold = 300;
  wage = 9800;
  romanceDebt = 0;
  staff = [];
  startStage();
}

function resetGame() {
  enemies = []; items = []; bullets = []; particles = [];
  gameState = STATE.TITLE;
  stage = 1;
  score = 0;
  gold = 300;
  wage = 9800;
  romanceDebt = 0;
  staff = [];
  player.stress = 18;
  say('', 0);
}

function startStage() {
  gameState = STATE.PLAYING;
  distance = 1000 + (stage-1)*120;
  enemies = []; items = []; bullets = []; particles = [];
  spawnTimer = 0;
  negotiateCooldown = 0;
  player.x = 195;
  player.stress = Math.max(12, player.stress * 0.55);
  say(`스테이지 ${stage}: 라면 불기 전에 출발!`, 80);
  tone(330,'triangle',0.1,0.04); setTimeout(()=>tone(494,'triangle',0.14,0.04),120);
}

function stageClear() {
  gameState = STATE.SHOP;
  const base = 850 + stage * 250;
  const tip = deliveryCombo * 60;
  const wageLeak = Math.floor((wage - 9800) * (0.10 + staff.length * 0.015));
  const debtLeak = Math.floor(romanceDebt * 0.12);
  const earn = Math.max(150, base + tip - wageLeak - debtLeak);
  gold += earn;
  score += 500 + stage*100;
  deliveryCombo = 0;
  shopMessage = `정산 +${earn}G | 시급누수 -${wageLeak}G | 낭만적자 -${debtLeak}G`;
  shopMessageTimer = 999;
  soundClear();
  if (stage >= maxStage) {
    gameState = STATE.CLEAR;
    endingLine = staff.length >= 4 ? '오토 매장은 완성됐지만, 사장의 통장에 별빛이 샜다.' : '소수정예 배달 성공. 낭만은 적자지만 라면은 뜨거웠다.';
  } else {
    stage++;
  }
}

function actionShoot() {
  if (gameState !== STATE.PLAYING) return;
  bullets.push({x:player.x + 28, y:player.y + 2, w:8, h:16, v:12, power:1, mini:false});
  staff.forEach((s, i) => {
    const pos = staffPosition(i);
    const fireCount = s.fire;
    for (let k=0; k<fireCount; k++) {
      bullets.push({x:pos.x+8 + k*5, y:pos.y-8, w:5, h:10, v:13, power:1, mini:true});
    }
  });
  soundShoot();
  score += 3 + staff.length;
}

function actionNegotiate() {
  if (gameState === STATE.ESCAPE) {
    player.stress -= 20;
    gold -= gold >= 120 ? 120 : 0;
    romanceDebt += 80;
    tone(587,'sine',0.07,0.07);
    if (player.stress <= 12) {
      player.stress = 12;
      gameState = STATE.PLAYING;
      player.x = 195;
      say('휴… 단무지 수당은 다음 회의에서요.', 90);
    } else {
      say('협상 중! 차슈 복지 검토!', 35);
    }
    return;
  }

  if (gameState !== STATE.PLAYING || negotiateCooldown > 0) return;
  negotiateCooldown = 95;
  if (gold >= 250) {
    gold -= 250;
    player.stress = Math.max(0, player.stress - 22);
    wage += 300;
    say('시급 +300원. 공룡들 눈빛이 순해졌다.', 60);
    tone(440,'sine',0.11,0.055);
  } else {
    romanceDebt += 450;
    player.stress = Math.max(0, player.stress - 12);
    wage += 500;
    say('현금 없음. 낭만어음 발행!', 70);
    soundNo();
  }
}

function hireStaff() {
  if (staff.length >= 5) { shopFlash('이미 우주선이 꽉 찼어요.'); soundNo(); return; }
  if (gold < 1500) { shopFlash('고용비 1500G가 필요해요.'); soundNo(); return; }
  gold -= 1500;
  const type = staffTypes[Math.floor(Math.random()*staffTypes.length)];
  staff.push({...type, mood: 65 + Math.random()*25});
  shopFlash(`${type.name} 아기 낭만사우르스 합류: “${type.line}”`);
  soundHire();
}

function buyChashuSnack() {
  if (gold < 800) { shopFlash('차슈 간식비 800G가 필요해요.'); soundNo(); return; }
  gold -= 800;
  player.stress = Math.max(0, player.stress - 28);
  staff.forEach(s => s.mood = Math.min(100, s.mood + 15));
  shopFlash('차슈 간식 배급. 사기 충전!');
  soundItem();
}

function shopFlash(text) {
  shopMessage = text;
  shopMessageTimer = 180;
}

function handlePointer(e) {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  if (gameState === STATE.TITLE) { startGame(); return; }
  if (gameState === STATE.GAMEOVER || gameState === STATE.CLEAR) { resetGame(); return; }

  if (gameState === STATE.SHOP) {
    if (inside(x,y,65,372,320,62)) { hireStaff(); return; }
    if (inside(x,y,65,448,320,62)) { buyChashuSnack(); return; }
    if (inside(x,y,65,544,320,62)) { startStage(); return; }
    return;
  }

  if (gameState === STATE.PLAYING || gameState === STATE.ESCAPE) {
    if (inside(x,y,buttons.left.x,buttons.left.y,buttons.left.w,buttons.left.h) && gameState === STATE.PLAYING) player.x = Math.max(10, player.x - 52);
    if (inside(x,y,buttons.right.x,buttons.right.y,buttons.right.w,buttons.right.h) && gameState === STATE.PLAYING) player.x = Math.min(W-player.w-10, player.x + 52);
    if (inside(x,y,buttons.shoot.x,buttons.shoot.y,buttons.shoot.w,buttons.shoot.h)) actionShoot();
    if (inside(x,y,buttons.nego.x,buttons.nego.y,buttons.nego.w,buttons.nego.h)) actionNegotiate();
  }
}

function inside(px,py,x,y,w,h) { return px>=x && px<=x+w && py>=y && py<=y+h; }

function staffPosition(i) {
  const side = (i % 2 === 0) ? 1 : -1;
  const step = Math.ceil((i+1)/2);
  return {x: player.x + player.w/2 + side*(45 + (step-1)*26) - 10, y: player.y + 52 + (step-1)*4};
}

function groupBounds() {
  let left = player.x;
  let right = player.x + player.w;
  staff.forEach((s,i) => {
    const p = staffPosition(i);
    left = Math.min(left, p.x - 4);
    right = Math.max(right, p.x + 28);
  });
  return {left, right, top: player.y, bottom: player.y + player.h};
}

function spawnEntity() {
  const difficulty = stage * 0.03 + staff.length * 0.035;
  const r = Math.random();
  if (r < 0.42 + difficulty) {
    enemies.push({kind:'meteor', x:rand(18,W-58), y:-50, w:38, h:38, v:rand(3.8,5.7)+stage*0.18, hp:2});
  } else if (r < 0.70 + difficulty) {
    enemies.push({kind:'review', x:rand(24,W-64), y:-48, w:42, h:32, v:rand(3.3,4.8)+stage*0.14, hp:1});
  } else if (r < 0.88) {
    enemies.push({kind:'ghost', x:rand(24,W-58), y:-48, w:36, h:42, v:rand(3.5,5.0)+stage*0.11, hp:1});
  } else {
    items.push({kind: Math.random()<0.72 ? 'chashu' : 'tip', x:rand(22,W-52), y:-40, w:30, h:30, v:rand(4.0,5.7)});
  }
}

function rand(a,b){ return Math.random()*(b-a)+a; }

function addParticles(x,y,n=8) {
  for (let i=0;i<n;i++) particles.push({x,y, vx:rand(-2.4,2.4), vy:rand(-2.8,1.8), life:rand(18,36), s:rand(2,5)});
}

function update() {
  stars.forEach(st => { st.y += st.v; if (st.y > H) { st.y = -5; st.x = Math.random()*W; }});
  if (dialogue.timer > 0) dialogue.timer--;
  if (shopMessageTimer > 0) shopMessageTimer--;
  if (negotiateCooldown > 0) negotiateCooldown--;
  if (shake > 0) shake--;
  if (player.hurt > 0) player.hurt--;
  if (player.blink > 0) player.blink--;
  particles.forEach((p,i)=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life--; if(p.life<=0) particles.splice(i,1); });

  if (gameState !== STATE.PLAYING && gameState !== STATE.ESCAPE) return;

  if (gameState === STATE.PLAYING) {
    if (keys['ArrowLeft']) player.x -= player.speed;
    if (keys['ArrowRight']) player.x += player.speed;
    player.x = Math.max(10, Math.min(W-player.w-10, player.x));

    const staffStress = staff.reduce((sum,s)=>sum+s.stress, 0);
    player.stress += 0.075 + stage*0.012 + staff.length*0.010 + staffStress;
    staff.forEach(s => s.mood = Math.max(0, s.mood - 0.018 - player.stress*0.0004));

    distance -= 1.15 + staff.length*0.38 + Math.max(0, (wage-9800)/12000);
    if (distance <= 0) { distance = 0; stageClear(); return; }

    if (player.stress >= 100) {
      player.stress = 100;
      gameState = STATE.ESCAPE;
      say('알바단 집단 탈주! 협상 버튼 연타!', 120);
      shake = 20;
    }

    spawnTimer++;
    const interval = Math.max(18, 48 - stage*3 - staff.length*2);
    if (spawnTimer % interval === 0) spawnEntity();
  } else if (gameState === STATE.ESCAPE) {
    player.x += 3.8;
    staff.forEach(s=>s.mood=Math.max(0,s.mood-0.3));
    if (player.x > W + 70) {
      gameState = STATE.GAMEOVER;
      endingLine = '알바단은 은하 휴게소로 떠났다. 라면은 차갑게 식었다.';
      soundNo();
    }
  }

  bullets.forEach((b,bi)=>{
    b.y -= b.v;
    if (b.y < -30) { bullets.splice(bi,1); return; }
    enemies.forEach((en,ei)=>{
      if (hit(b,en)) {
        en.hp -= b.power;
        bullets.splice(bi,1);
        if (en.hp <= 0) {
          enemies.splice(ei,1);
          const reward = en.kind === 'meteor' ? 80 : en.kind === 'review' ? 130 : 110;
          gold += reward;
          score += reward;
          deliveryCombo++;
          addParticles(en.x+en.w/2,en.y+en.h/2,10);
          if (en.kind === 'review') say('리뷰 1점 UFO 격추!', 42);
          if (en.kind === 'ghost') say('공짜라면 유령 퇴치!', 42);
          tone(660,'square',0.05,0.04);
        }
      }
    });
  });

  enemies.forEach((en,ei)=>{
    en.y += en.v;
    if (en.y > H+50) { enemies.splice(ei,1); return; }
    const bounds = groupBounds();
    if (en.x < bounds.right && en.x + en.w > bounds.left && en.y < bounds.bottom && en.y + en.h > bounds.top) {
      enemies.splice(ei,1);
      shake = 16;
      player.hurt = 14;
      noiseHit();
      addParticles(en.x+en.w/2,en.y+en.h/2,12);
      if (staff.length > 0 && Math.random() < 0.62) {
        const lost = staff.pop();
        player.stress = Math.min(100, player.stress + 13);
        say(`${lost.name} 알바생이 조기 퇴근!`, 70);
      } else {
        const penalty = en.kind === 'meteor' ? 28 : 18;
        player.stress = Math.min(100, player.stress + penalty);
        gold = Math.max(0, gold - (en.kind === 'review' ? 180 : 80));
        say(en.kind === 'review' ? '리뷰 1점 직격. 마음이 찢김.' : '우주 충돌! 스트레스 급상승!', 60);
      }
    }
  });

  items.forEach((it,ii)=>{
    it.y += it.v;
    if (it.y > H+40) { items.splice(ii,1); return; }
    if (hit(it, {x:player.x,y:player.y,w:player.w,h:player.h})) {
      items.splice(ii,1);
      if (it.kind === 'chashu') {
        player.stress = Math.max(0, player.stress - 24);
        gold += 250;
        say('황금 차슈 획득. 모두 잠깐 착해짐.', 60);
      } else {
        gold += 650;
        romanceDebt = Math.max(0, romanceDebt - 120);
        say('손님 팁 획득! 낭만적자 소폭 회복.', 60);
      }
      soundItem(); addParticles(it.x+15,it.y+15,12);
    }
  });
}

function hit(a,b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

function drawRoundedRect(x,y,w,h,r,fill,stroke=null) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
}

function draw() {
  const sx = shake ? rand(-shake*0.35, shake*0.35) : 0;
  const sy = shake ? rand(-shake*0.25, shake*0.25) : 0;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.clearRect(-20,-20,W+40,H+40);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, gameState === STATE.ESCAPE ? '#25030d' : '#050522');
  g.addColorStop(0.48, '#02020c');
  g.addColorStop(1, '#090411');
  ctx.fillStyle = g;
  ctx.fillRect(-20,-20,W+40,H+40);
  drawStars();

  if (gameState === STATE.TITLE) drawTitle();
  else {
    drawHUD();
    drawWorld();
    drawPlayerGroup();
    drawControls();
    if (gameState === STATE.SHOP) drawShop();
    if (gameState === STATE.GAMEOVER) drawEnd(false);
    if (gameState === STATE.CLEAR) drawEnd(true);
  }
  ctx.restore();
}

function drawStars() {
  stars.forEach(st => {
    ctx.globalAlpha = st.a;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(st.x, st.y, st.s, st.s);
  });
  ctx.globalAlpha = 1;
}

function drawTitle() {
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00f2ff';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('은하 라면 익스프레스', W/2, 92);
  ctx.fillStyle = '#ff7aa8';
  ctx.font = 'bold 31px sans-serif';
  ctx.fillText('낭만사우르스 알바단', W/2, 135);
  ctx.fillStyle = '#fff6a6';
  ctx.font = 'bold 17px sans-serif';
  ctx.fillText('“시급 올려주면 쏠게요.”', W/2, 176);

  drawDino(W/2-35, 252, 2.2, '#e85d75', true);
  drawMiniDino(W/2-92, 355, '#ffb74d', 1.6);
  drawMiniDino(W/2+64, 355, '#b39ddb', 1.6);
  drawRamenBowl(W/2-40, 450, 1.6);

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  drawRoundedRect(34, 548, 382, 86, 16, 'rgba(255,255,255,0.08)', 'rgba(255,255,255,0.18)');
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.fillText('운석은 피하고, 리뷰 1점 UFO는 단무지로 격추!', W/2, 575);
  ctx.fillText('알바생이 많을수록 화력은 증가, 스트레스도 증가.', W/2, 603);
  ctx.fillStyle = '#00ff9c';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('화면 클릭 또는 Enter로 영업 시작', W/2, 676);
}

function drawHUD() {
  drawRoundedRect(12, 12, W-24, 88, 14, 'rgba(255,255,255,0.075)', 'rgba(255,255,255,0.12)');
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText(`STAGE ${stage}/${maxStage}`, 25, 36);
  ctx.fillText(`자금 ${gold}G`, 137, 36);
  ctx.fillText(`시급 ${wage}원`, 240, 36);
  ctx.fillText(`알바 ${staff.length}/5`, 365, 36);

  ctx.fillStyle = '#25263b'; ctx.fillRect(25, 58, 190, 13);
  ctx.fillStyle = '#00e5ff'; ctx.fillRect(25, 58, (1-distance/(1000+(stage-1)*120))*190, 13);
  ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.fillText(`배달 진행`, 25, 87);

  ctx.fillStyle = '#25263b'; ctx.fillRect(240, 58, 170, 13);
  ctx.fillStyle = player.stress > 75 ? '#ff1744' : '#ffea00';
  ctx.fillRect(240, 58, Math.min(1, player.stress/100)*170, 13);
  ctx.fillStyle = '#fff'; ctx.fillText(`스트레스 ${Math.floor(player.stress)}%`, 240, 87);

  if (romanceDebt > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,122,168,0.88)';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText(`낭만적자 ${romanceDebt}G`, W/2, 111);
  }
}

function drawWorld() {
  bullets.forEach(b=>{
    ctx.fillStyle = b.mini ? '#fff59d' : '#ffeb3b';
    drawRoundedRect(b.x,b.y,b.w,b.h,3,ctx.fillStyle);
  });

  enemies.forEach(en=>{
    if (en.kind === 'meteor') drawMeteor(en.x,en.y,en.w);
    if (en.kind === 'review') drawReviewUFO(en.x,en.y);
    if (en.kind === 'ghost') drawGhost(en.x,en.y);
  });

  items.forEach(it=>{
    if (it.kind === 'chashu') drawChashu(it.x,it.y);
    else drawTip(it.x,it.y);
  });

  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(0, p.life/36);
    ctx.fillStyle = '#fff7a8';
    ctx.fillRect(p.x,p.y,p.s,p.s);
    ctx.globalAlpha = 1;
  });
}

function drawPlayerGroup() {
  staff.forEach((s,i)=>{
    const p = staffPosition(i);
    drawMiniDino(p.x, p.y, s.color, 1);
    if (i < 3) {
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.font = '8px sans-serif';
      ctx.fillText(s.name, p.x+9, p.y+38);
    }
  });
  drawDino(player.x, player.y, 1, player.hurt ? '#ff1744' : '#e85d75', false);

  if (dialogue.timer > 0 && dialogue.text) {
    const bx = Math.max(20, Math.min(W-225, player.x - 58));
    drawRoundedRect(bx, player.y - 62, 225, 36, 10, '#ffffff', 'rgba(0,0,0,0.2)');
    ctx.fillStyle = '#111';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(dialogue.text, bx + 12, player.y - 39);
  }
}

function drawControls() {
  drawRoundedRect(0, 658, W, 92, 0, 'rgba(12,12,30,0.92)');
  Object.values(buttons).forEach(btn=>{
    const disabled = btn === buttons.nego && negotiateCooldown > 0 && gameState === STATE.PLAYING;
    const fill = btn === buttons.shoot ? '#ff9800' : btn === buttons.nego ? (gameState === STATE.ESCAPE ? '#ff1744' : '#42a85b') : '#384ac4';
    drawRoundedRect(btn.x,btn.y,btn.w,btn.h,12, disabled ? '#555' : fill, 'rgba(255,255,255,0.18)');
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px sans-serif';
    let label = btn.label;
    if (btn === buttons.nego && gameState === STATE.ESCAPE) label = '협상연타';
    else if (btn === buttons.nego && negotiateCooldown > 0) label = '대기';
    ctx.fillText(label, btn.x+btn.w/2, btn.y+30);
  });
}

function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ff9c';
  ctx.font = 'bold 27px sans-serif';
  ctx.fillText('배달 성공, 정산 시간!', W/2, 178);
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.fillText(`현재 자금 ${gold}G | 알바 ${staff.length}/5 | 스트레스 ${Math.floor(player.stress)}%`, W/2, 220);
  ctx.fillStyle = '#ffeb9c';
  ctx.font = '12px sans-serif';
  ctx.fillText(shopMessage || '다음 배달 전에 알바단을 정비하세요.', W/2, 258);

  drawShopButton(65,372,320,62,'아기 낭만사우르스 고용', '1500G, 화력 증가 + 걱정 증가');
  drawShopButton(65,448,320,62,'황금 차슈 간식 배급', '800G, 스트레스 감소');
  drawShopButton(65,544,320,62,'다음 배달 출발', 'Enter 또는 클릭');
}

function drawShopButton(x,y,w,h,title,sub) {
  drawRoundedRect(x,y,w,h,16,'rgba(255,255,255,0.10)','rgba(255,255,255,0.22)');
  ctx.fillStyle = '#fff'; ctx.font = 'bold 15px sans-serif'; ctx.fillText(title,x+w/2,y+26);
  ctx.fillStyle = 'rgba(255,255,255,0.72)'; ctx.font = '11px sans-serif'; ctx.fillText(sub,x+w/2,y+47);
}

function drawEnd(clear) {
  ctx.fillStyle = clear ? 'rgba(3,26,18,0.92)' : 'rgba(35,0,10,0.92)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.fillStyle = clear ? '#ffd700' : '#ff5c7a';
  ctx.font = 'bold 29px sans-serif';
  ctx.fillText(clear ? '우주 라면왕 등극!' : '알바단 탈주 엔딩', W/2, 250);
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.fillText(endingLine, W/2, 315);
  ctx.fillText(`최종 점수 ${score} | 남은 자금 ${gold}G | 낭만적자 ${romanceDebt}G`, W/2, 355);
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('Enter 또는 클릭으로 다시 개업', W/2, 472);
}

function drawDino(x,y,scale=1,color='#e85d75',hero=false) {
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  ctx.fillStyle = color;
  drawRoundedRect(0,24,60,68,10,color);
  drawRoundedRect(-4,1,66,36,12,color);
  ctx.fillStyle = '#fbc403';
  drawRoundedRect(5,42,50,28,8,'#fbc403');
  ctx.fillStyle = '#fff';
  ctx.fillRect(16,11,12,12); ctx.fillRect(39,11,12,12);
  ctx.fillStyle = '#101020';
  ctx.fillRect(20,15,4,5); ctx.fillRect(43,15,4,5);
  ctx.fillStyle = 'rgba(150,220,255,0.38)';
  ctx.beginPath(); ctx.arc(30,17,35,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5,61,10,0,Math.PI,false); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = hero ? 'bold 8px sans-serif' : 'bold 7px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('RAMEN',30,60);
  ctx.restore();
}

function drawMiniDino(x,y,color='#ff8aa6',scale=1) {
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  ctx.fillStyle = color;
  drawRoundedRect(0,4,20,27,5,color);
  drawRoundedRect(-4,-7,25,14,5,color);
  ctx.fillStyle = '#fbc403'; ctx.fillRect(3,13,14,10);
  ctx.fillStyle = 'rgba(150,220,255,0.42)';
  ctx.beginPath(); ctx.arc(8,0,12,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.fillRect(3,-3,4,4); ctx.fillRect(13,-3,4,4);
  ctx.fillStyle = '#111'; ctx.fillRect(5,-2,2,2); ctx.fillRect(15,-2,2,2);
  ctx.restore();
}

function drawMeteor(x,y,s) {
  ctx.fillStyle = '#e86a2f';
  ctx.fillRect(x+6,y+2,s-12,s-4); ctx.fillRect(x+2,y+9,s-4,s-16); ctx.fillRect(x+11,y-3,s-22,s+6);
  ctx.fillStyle = '#6d3a22'; ctx.fillRect(x+8,y+8,s-16,s-16);
  ctx.fillStyle = '#2b1b14'; ctx.fillRect(x+17,y+13,7,6);
}

function drawReviewUFO(x,y) {
  ctx.fillStyle = '#76ff03';
  drawRoundedRect(x,y+12,42,16,8,'#76ff03');
  ctx.fillStyle = '#d7ffd1';
  ctx.beginPath(); ctx.arc(x+21,y+14,14,Math.PI,0); ctx.fill();
  ctx.fillStyle = '#111'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('★1',x+21,y+25);
}

function drawGhost(x,y) {
  ctx.fillStyle = 'rgba(180,255,230,0.9)';
  drawRoundedRect(x,y,36,42,16,'rgba(180,255,230,0.9)');
  ctx.fillStyle = '#101020';
  ctx.fillRect(x+9,y+14,5,8); ctx.fillRect(x+22,y+14,5,8);
  ctx.fillStyle = '#ffeb3b'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('공짜',x+18,y+34);
}

function drawChashu(x,y) {
  ctx.fillStyle = '#ffb300'; ctx.beginPath(); ctx.arc(x+15,y+15,15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff5252'; drawRoundedRect(x+5,y+12,20,7,4,'#ff5252');
}

function drawTip(x,y) {
  ctx.fillStyle = '#b5ff7a'; drawRoundedRect(x,y,30,22,6,'#b5ff7a');
  ctx.fillStyle = '#1b421b'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText('TIP',x+15,y+15);
}

function drawRamenBowl(x,y,scale=1) {
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  ctx.fillStyle = '#ffffff'; drawRoundedRect(0,20,50,20,10,'#ffffff');
  ctx.fillStyle = '#ff4d4d'; ctx.fillRect(6,24,38,4);
  ctx.strokeStyle = '#ffd54f'; ctx.lineWidth = 2;
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(8+i*8,18); ctx.quadraticCurveTo(12+i*8,12,16+i*8,18); ctx.stroke(); }
  ctx.restore();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
