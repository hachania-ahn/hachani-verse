<head>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400&family=Space+Grotesk:wght@300;400&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; min-height: 100dvh;
            background-color: #020206; color: #ffffff;
            font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
            overflow: hidden; user-select: none; touch-action: manipulation;
        }

        /* 깊은 우주 오로라 배경 */
        .space-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(20, 20, 45, 0.5) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(10, 35, 35, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(30, 15, 45, 0.4) 0%, transparent 60%);
            z-index: 1;
        }

        /* 떠다니는 자모음 스타일 */
        .floating-jamo {
            position: absolute; font-weight: 100; color: rgba(200, 230, 255, 0.4);
            text-shadow: 0 0 15px rgba(147, 197, 253, 0.3);
            transition: all 2.5s cubic-bezier(0.25, 1, 0.5, 1); font-size: 28px; z-index: 60;
        }

        /* 홀로그램 말풍선 */
        .hologram-box {
            position: absolute; background: rgba(8, 16, 32, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.35); box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(8px); padding: 14px 18px; border-radius: 4px;
            font-size: 13px; color: #e2f1f9; max-width: 280px;
            pointer-events: none; opacity: 0; transform: translateY(10px);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100;
        }
        .hologram-box.active { opacity: 1; transform: translateY(0); }

        .hologram-line {
            position: absolute; width: 1px;
            background: linear-gradient(to top, rgba(0, 242, 254, 0.4), transparent);
            transform-origin: bottom; transition: all 0.3s ease; z-index: 95; display: none;
        }

        /* 행성 오브젝트: 기존 우주 톤은 유지하되, 모바일에서도 이모티콘 배지처럼 선명하게 */
        .celestial-obj {
            position: absolute; border-radius: 999px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            cursor: pointer; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, opacity 0.4s ease;
            z-index: 10; overflow: hidden; text-align: center;
            background:
                radial-gradient(circle at 35% 28%, rgba(255,255,255,0.22), transparent 34%),
                radial-gradient(circle at 50% 72%, rgba(255,255,255,0.05), transparent 56%),
                var(--planet-bg);
            box-shadow: 0 0 14px rgba(255,255,255,0.04), inset 0 0 18px rgba(255,255,255,0.05);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .celestial-obj:hover, .celestial-obj.focused { transform: scale(1.48); filter: brightness(1.28) saturate(1.2); box-shadow: 0 0 34px rgba(255,255,255,0.18), inset 0 0 22px rgba(255,255,255,0.08); z-index: 30; }
        .celestial-obj:hover .celestial-name, .celestial-obj.focused .celestial-name { opacity: 1; font-weight: 500; text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 16px rgba(255,255,255,0.34); }
        .celestial-obj:hover .celestial-icon, .celestial-obj.focused .celestial-icon { filter: drop-shadow(0 0 12px rgba(255,255,255,0.72)); }
        .celestial-icon {
            line-height: 1; font-size: clamp(15px, 3.2vw, 23px);
            filter: drop-shadow(0 0 7px rgba(255,255,255,0.45));
        }
        .celestial-name {
            max-width: 86%; font-size: clamp(7px, 1.45vw, 10px); line-height: 1.05;
            font-weight: 400; letter-spacing: -0.04em;
            text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 8px rgba(255,255,255,0.16);
            white-space: normal; word-break: keep-all;
        }
        .celestial-obj.inactive { opacity: 0.78; }
        .celestial-obj.inactive .celestial-icon { opacity: 0.72; filter: drop-shadow(0 0 4px rgba(255,255,255,0.2)); }

        @media (max-width: 640px) {
            #core-sun { width: 76px !important; height: 76px !important; }
            #core-sun .text-xl { font-size: 1rem; }
            .celestial-name { font-size: 7px; line-height: 1; }
            .hologram-box { max-width: calc(100vw - 32px); font-size: 12px; padding: 12px 14px; }
            #custom-cursor { display: none; }
        }

        .orbit-line {
            position: absolute; top: 50%; left: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.035);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 2;
        }

        #custom-cursor {
            width: 6px; height: 6px; background: rgba(0, 242, 254, 0.8);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
            transition: width 0.2s, height 0.2s;
        }
        
        .typing { border-right: 2px solid rgba(0, 242, 254, 0.75); animation: blink .75s step-end infinite; }
        @keyframes blink { 50% { border-color: transparent } }


        /* --- 성좌 상세 패널: 데스크탑은 우측 관측창, 모바일은 바텀시트 --- */
        .planet-backdrop {
            position: fixed; inset: 0; z-index: 180;
            background: rgba(2, 2, 8, 0.42);
            backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
            opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
        }
        .planet-backdrop.active { opacity: 1; pointer-events: auto; }

        .planet-panel {
            position: fixed; top: 50%; right: 28px; transform: translate(26px, -50%) scale(0.985);
            width: min(430px, calc(100vw - 56px)); max-height: min(760px, calc(100dvh - 56px));
            z-index: 190; opacity: 0; pointer-events: none; overflow: hidden;
            border: 1px solid rgba(125, 211, 252, 0.28); border-radius: 26px;
            background:
                radial-gradient(circle at 20% 0%, rgba(45, 212, 191, 0.14), transparent 34%),
                radial-gradient(circle at 90% 18%, rgba(250, 204, 21, 0.13), transparent 30%),
                rgba(4, 9, 18, 0.86);
            box-shadow: 0 0 38px rgba(14, 165, 233, 0.12), 0 24px 80px rgba(0,0,0,0.58);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .planet-panel.active { opacity: 1; pointer-events: auto; transform: translate(0, -50%) scale(1); }
        .planet-panel-inner { max-height: inherit; overflow-y: auto; padding: 22px; scrollbar-width: thin; scrollbar-color: rgba(125,211,252,0.35) transparent; }
        .planet-panel-inner::-webkit-scrollbar { width: 4px; }
        .planet-panel-inner::-webkit-scrollbar-thumb { background: rgba(125,211,252,0.35); border-radius: 99px; }

        .panel-kicker { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(125,211,252,0.58); }
        .panel-title { margin-top: 8px; font-size: 24px; line-height: 1.14; font-weight: 300; letter-spacing: -0.04em; color: rgba(255,255,255,0.94); }
        .panel-desc { margin-top: 10px; font-size: 13px; line-height: 1.8; color: rgba(226,241,249,0.72); word-break: keep-all; }
        .panel-close {
            position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.045);
            color: rgba(255,255,255,0.72); cursor: pointer; transition: all 0.2s ease;
        }
        .panel-close:hover { color: white; background: rgba(255,255,255,0.1); }
        .panel-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 18px; }
        .panel-tab {
            border: 1px solid rgba(255,255,255,0.09); border-radius: 999px; padding: 8px 4px;
            background: rgba(255,255,255,0.035); color: rgba(255,255,255,0.48);
            font-size: 10px; letter-spacing: -0.02em; cursor: pointer; transition: all 0.2s ease;
        }
        .panel-tab.active { border-color: rgba(250,204,21,0.42); color: rgba(254,240,138,0.95); background: rgba(250,204,21,0.09); box-shadow: 0 0 18px rgba(250,204,21,0.08); }
        .panel-content { margin-top: 18px; }
        .content-grid { display: grid; gap: 10px; }
        .short-card, .atlas-card, .progress-card, .newsletter-card {
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.085); border-radius: 18px;
            background: rgba(255,255,255,0.045); padding: 14px; color: rgba(255,255,255,0.86);
        }
        .short-card { display: grid; grid-template-columns: 42px 1fr; gap: 12px; align-items: start; }
        .short-number {
            width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center;
            background: rgba(250,204,21,0.1); border: 1px solid rgba(250,204,21,0.18); color: rgba(254,240,138,0.92);
            font-size: 12px; letter-spacing: 0.03em;
        }
        .short-title { font-size: 13px; line-height: 1.35; font-weight: 400; color: rgba(255,255,255,0.92); }
        .short-copy { margin-top: 4px; font-size: 11px; line-height: 1.55; color: rgba(226,241,249,0.62); word-break: keep-all; }
        .short-status { margin-top: 8px; display: inline-flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: 0.08em; color: rgba(125,211,252,0.68); text-transform: uppercase; }
        .short-link { text-decoration: none; }
        .short-link:hover .short-card { border-color: rgba(125,211,252,0.26); background: rgba(125,211,252,0.075); }

        .game-intro {
            margin-bottom: 12px; padding: 13px 14px; border: 1px solid rgba(196,181,253,0.14); border-radius: 18px;
            background: linear-gradient(135deg, rgba(168,85,247,0.09), rgba(125,211,252,0.045));
            color: rgba(226,241,249,0.72); font-size: 11px; line-height: 1.75; word-break: keep-all;
        }
        .game-grid { display: grid; gap: 11px; }
        .game-card {
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.09); border-radius: 20px;
            background:
                radial-gradient(circle at 8% 0%, rgba(168,85,247,0.14), transparent 34%),
                radial-gradient(circle at 96% 18%, rgba(125,211,252,0.1), transparent 32%),
                rgba(255,255,255,0.045);
            padding: 15px; color: rgba(255,255,255,0.86);
        }
        .game-card-head { display: grid; grid-template-columns: 42px 1fr; gap: 12px; align-items: center; }
        .game-icon {
            width: 42px; height: 42px; border-radius: 15px; display: grid; place-items: center;
            background: rgba(168,85,247,0.12); border: 1px solid rgba(196,181,253,0.22);
            font-size: 21px; filter: drop-shadow(0 0 7px rgba(196,181,253,0.3));
        }
        .game-title { font-size: 14px; line-height: 1.35; font-weight: 400; color: rgba(255,255,255,0.94); }
        .game-status { margin-top: 5px; font-size: 9px; letter-spacing: 0.12em; color: rgba(196,181,253,0.76); text-transform: uppercase; }
        .game-copy { margin-top: 10px; font-size: 11px; line-height: 1.7; color: rgba(226,241,249,0.64); word-break: keep-all; }
        .game-route {
            display: block; margin-top: 10px; padding: 8px 10px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.16);
            color: rgba(186,230,253,0.64); font-size: 10px; overflow-wrap: anywhere; user-select: text;
        }
        .game-button, .game-button-disabled {
            display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 10px; padding: 11px 12px;
            border-radius: 999px; font-size: 11px; letter-spacing: 0.08em; text-decoration: none; transition: all 0.2s ease;
        }
        .game-button { border: 1px solid rgba(196,181,253,0.28); background: rgba(168,85,247,0.11); color: rgba(233,213,255,0.95); }
        .game-button:hover { border-color: rgba(125,211,252,0.32); background: rgba(125,211,252,0.08); color: white; }
        .game-button-disabled { border: 1px solid rgba(255,255,255,0.09); background: rgba(255,255,255,0.035); color: rgba(255,255,255,0.36); cursor: not-allowed; }

        .brain-intro {
            margin-bottom: 12px; padding: 13px 14px; border: 1px solid rgba(134,239,172,0.14); border-radius: 18px;
            background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(125,211,252,0.045));
            color: rgba(226,241,249,0.74); font-size: 11px; line-height: 1.75; word-break: keep-all;
        }
        .brain-board {
            position: relative; overflow: hidden; border: 1px solid rgba(134,239,172,0.16); border-radius: 22px;
            background:
                radial-gradient(circle at 12% 0%, rgba(134,239,172,0.10), transparent 34%),
                linear-gradient(145deg, rgba(5, 34, 28, 0.88), rgba(4, 14, 21, 0.9));
            box-shadow: inset 0 0 22px rgba(255,255,255,0.035), 0 0 24px rgba(34,197,94,0.055);
            padding: 15px; color: rgba(236,253,245,0.9);
        }
        .brain-board::after {
            content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.28;
            background-image: radial-gradient(circle, rgba(255,255,255,0.16) 0 1px, transparent 1px);
            background-size: 18px 18px; mix-blend-mode: screen;
        }
        .brain-board-title { position: relative; z-index: 1; font-size: 13px; letter-spacing: 0.08em; color: rgba(220,252,231,0.92); }
        .brain-board-layout { position: relative; z-index: 1; display: grid; grid-template-columns: 0.92fr 1.08fr; gap: 12px; margin-top: 12px; }
        .brain-left, .brain-right { border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 12px; background: rgba(0,0,0,0.14); }
        .chalk-label { font-size: 10px; letter-spacing: 0.14em; color: rgba(187,247,208,0.72); text-transform: uppercase; }
        .chalk-list { margin-top: 9px; display: grid; gap: 7px; font-size: 11px; line-height: 1.55; color: rgba(240,253,244,0.75); }
        .chalk-list span { display: block; padding-left: 12px; position: relative; word-break: keep-all; }
        .chalk-list span::before { content: '·'; position: absolute; left: 0; color: rgba(187,247,208,0.75); }
        .brain-slots { margin-top: 9px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
        .brain-slot {
            min-height: 68px; border: 1px dashed rgba(240,253,244,0.2); border-radius: 15px; padding: 9px;
            background: rgba(255,255,255,0.035); color: rgba(240,253,244,0.78); cursor: pointer;
            transition: all 0.2s ease; text-align: left;
        }
        .brain-slot:hover { border-color: rgba(134,239,172,0.34); background: rgba(134,239,172,0.06); }
        .brain-slot-time { display: block; font-size: 9px; letter-spacing: 0.12em; color: rgba(134,239,172,0.78); text-transform: uppercase; }
        .brain-slot-task { display: block; margin-top: 7px; font-size: 11px; line-height: 1.45; word-break: keep-all; }
        .brain-slot.erased { opacity: 0.42; }
        .brain-slot.erased .brain-slot-task { text-decoration: line-through; text-decoration-thickness: 2px; text-decoration-color: rgba(255,255,255,0.65); }
        .brain-ritual-grid { display: grid; gap: 9px; margin-top: 12px; }
        .brain-ritual-card {
            border: 1px solid rgba(255,255,255,0.085); border-radius: 18px; background: rgba(255,255,255,0.045);
            padding: 13px; display: grid; grid-template-columns: 34px 1fr; gap: 10px; align-items: start;
        }
        .brain-ritual-no { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 13px; background: rgba(134,239,172,0.09); border: 1px solid rgba(134,239,172,0.18); color: rgba(187,247,208,0.9); font-size: 11px; }
        .brain-ritual-title { font-size: 12px; color: rgba(255,255,255,0.9); }
        .brain-ritual-copy { margin-top: 4px; font-size: 11px; line-height: 1.62; color: rgba(226,241,249,0.62); word-break: keep-all; }
        .brain-channel-card {
            margin-top: 12px; border: 1px solid rgba(125,211,252,0.13); border-radius: 20px;
            background: linear-gradient(135deg, rgba(125,211,252,0.07), rgba(134,239,172,0.045)); padding: 14px;
        }
        .brain-channel-button, .brain-channel-button-disabled {
            display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 10px; padding: 11px 12px;
            border-radius: 999px; font-size: 11px; letter-spacing: 0.08em; text-decoration: none; transition: all 0.2s ease;
        }
        .brain-channel-button { border: 1px solid rgba(134,239,172,0.28); background: rgba(34,197,94,0.1); color: rgba(220,252,231,0.95); }
        .brain-channel-button:hover { border-color: rgba(125,211,252,0.32); background: rgba(125,211,252,0.08); color: white; }
        .brain-channel-button-disabled { border: 1px solid rgba(255,255,255,0.09); background: rgba(255,255,255,0.035); color: rgba(255,255,255,0.36); cursor: not-allowed; }

        .atlas-card-title { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.9); }
        .atlas-card-title span:first-child { font-size: 17px; }
        .atlas-card p { margin-top: 6px; font-size: 11px; line-height: 1.65; color: rgba(226,241,249,0.64); word-break: keep-all; }
        .atlas-intro {
            margin-bottom: 12px; padding: 13px 14px; border: 1px solid rgba(125,211,252,0.12); border-radius: 18px;
            background: linear-gradient(135deg, rgba(125,211,252,0.07), rgba(250,204,21,0.045));
            color: rgba(226,241,249,0.72); font-size: 11px; line-height: 1.75; word-break: keep-all;
        }
        .atlas-card {
            text-align: left; width: 100%; cursor: pointer; appearance: none; -webkit-appearance: none;
            transition: border-color 0.22s ease, background 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
        }
        .atlas-card:hover, .atlas-card.active {
            border-color: rgba(250,204,21,0.28); background: rgba(250,204,21,0.075); transform: translateY(-1px);
            box-shadow: 0 0 22px rgba(250,204,21,0.055);
        }
        .atlas-card.active::after {
            content: ''; position: absolute; inset: auto 14px 12px 14px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(250,204,21,0.48), transparent);
        }
        .atlas-detail-card {
            margin-top: 12px; border: 1px solid rgba(125,211,252,0.16); border-radius: 22px; overflow: hidden;
            background:
                radial-gradient(circle at 12% 0%, rgba(250,204,21,0.12), transparent 34%),
                radial-gradient(circle at 92% 20%, rgba(45,212,191,0.12), transparent 32%),

        .atlas-detail-head { padding: 16px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.075); }
        .atlas-detail-title { display: flex; align-items: center; gap: 9px; font-size: 16px; color: rgba(255,255,255,0.94); }
        .atlas-detail-title span:first-child { font-size: 22px; }
        .atlas-detail-subtitle { margin-top: 5px; font-size: 11px; line-height: 1.6; color: rgba(254,240,138,0.78); word-break: keep-all; }
        .atlas-detail-body { display: grid; gap: 9px; padding: 14px 16px 16px; }
        .atlas-detail-row { display: grid; gap: 4px; }
        .atlas-detail-label { font-size: 9px; letter-spacing: 0.16em; color: rgba(125,211,252,0.62); text-transform: uppercase; }
        .atlas-detail-text { font-size: 11px; line-height: 1.7; color: rgba(226,241,249,0.72); word-break: keep-all; }
        .atlas-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px; }
        .atlas-jump {
            border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 10px 8px;
            background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.64); font-size: 10px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .atlas-jump:hover { border-color: rgba(125,211,252,0.28); color: rgba(186,230,253,0.95); background: rgba(125,211,252,0.07); }
        .progress-list { display: grid; gap: 9px; margin-top: 10px; }
        .progress-row { display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 8px; font-size: 11px; color: rgba(226,241,249,0.7); }
        .progress-dot { width: 10px; height: 10px; border-radius: 999px; background: rgba(125,211,252,0.34); box-shadow: 0 0 12px rgba(125,211,252,0.25); justify-self: center; }
        .progress-tag { font-size: 9px; color: rgba(254,240,138,0.65); border: 1px solid rgba(254,240,138,0.17); border-radius: 999px; padding: 3px 7px; }
        .progress-tag.wait { color: rgba(255,255,255,0.38); border-color: rgba(255,255,255,0.1); }

        // --- 궤도 시스템 ---
        function getOrbitLayout(p) {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const minSide = Math.min(vw, vh);
            const maxOriginalRadius = Math.max(...planetsData.map(item => item.radius));

            // 데스크탑/랩탑에서는 원본 우주의 넓은 스케일을 유지한다.
            // 모바일에서만 성좌들이 화면 밖으로 나가지 않도록 궤도를 압축한다.
            if (vw >= 768) {
                return { radius: p.radius, size: p.size };
            }

            const edgePadding = 28;
            const minRadius = 72;
            const maxFittableRadius = Math.max(82, (minSide / 2) - edgePadding);
            const scaledRadius = minRadius + (p.radius / maxOriginalRadius) * Math.max(1, maxFittableRadius - minRadius);
            const radius = Math.max(64, Math.min(scaledRadius, maxFittableRadius));
            const size = Math.max(38, Math.round(p.size * 0.88));
            return { radius, size };
        }

        function getStrokeGlow(stroke, alpha = 0.26) {
            return stroke.replace(/rgba\(([^,]+),([^,]+),([^,]+),[^)]+\)/, `rgba($1,$2,$3,${alpha})`);
        }

        function buildOrbitSystem() {
            orbitSystem.innerHTML = '';
            const responsiveRadii = [...new Set(planetsData.map(p => Math.round(getOrbitLayout(p).radius)))];
            responsiveRadii.forEach(r => {
                const orbit = document.createElement('div'); orbit.className = 'orbit-line'; orbit.style.width = `${r * 2}px`; orbit.style.height = `${r * 2}px`; orbitSystem.appendChild(orbit);
            });
            planetsData.forEach((p, idx) => {
                const layout = getOrbitLayout(p);
                const obj = document.createElement('div'); obj.className = `celestial-obj border ${p.type === 'inactive' ? 'inactive' : 'active'}`; obj.id = `planet-${idx}`;
                obj.style.width = `${layout.size}px`; obj.style.height = `${layout.size}px`; obj.style.setProperty('--planet-bg', p.color); obj.style.borderColor = p.stroke;
                if(p.type.startsWith('active')) { obj.style.boxShadow = `0 0 18px ${getStrokeGlow(p.stroke, 0.24)}, inset 0 0 18px rgba(255,255,255,0.06)`; }
                obj.innerHTML = `<span class="celestial-icon" aria-hidden="true">${p.icon}</span><span class="celestial-name ${p.type === 'inactive' ? 'text-slate-300' : 'text-white'}">${p.shortName || p.name}</span>`;
                obj.setAttribute('role', 'button');
                obj.setAttribute('tabindex', '0');
                obj.setAttribute('aria-label', `${p.name} 열기`);
                obj.addEventListener('mouseenter', (e) => { playBlipSound(); triggerHologram(e, p, obj); });
                obj.addEventListener('mouseleave', hideHologram);
                obj.addEventListener('touchstart', (e) => { playBlipSound(); triggerHologram(e, p, obj); }, { passive: true });
                obj.addEventListener('click', () => { openPlanetPanel(p); });
                obj.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPlanetPanel(p); } });
                orbitSystem.appendChild(obj);
            });
        }

        function animateOrbitSystem() {
            if (!isUniverseActive) return; const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2;
            planetsData.forEach((p, idx) => {
                const obj = document.getElementById(`planet-${idx}`); if (!obj) return;
                const layout = getOrbitLayout(p);
                angleOffsets[idx] += p.speed;
                const x = centerX + Math.cos(angleOffsets[idx]) * layout.radius - (layout.size / 2);
                const y = centerY + Math.sin(angleOffsets[idx]) * layout.radius - (layout.size / 2);
                obj.style.left = `${x}px`; obj.style.top = `${y}px`;
            });
            requestAnimationFrame(animateOrbitSystem);
        }

        let typeInterval;
        function triggerHologram(e, planet, element) {
            cursor.style.width = '12px'; cursor.style.height = '12px'; clearInterval(typeInterval); hologramTooltip.innerHTML = '';
            hologramLine.style.display = 'block'; updateHologramLine(element); hologramTooltip.classList.add('active');
            let currentText = ""; let charIdx = 0; hologramTooltip.innerHTML = `<span class="typing"></span>`; const typingSpan = hologramTooltip.querySelector('.typing');
            typeInterval = setInterval(() => {
                if (charIdx < planet.text.length) { currentText += planet.text[charIdx]; typingSpan.textContent = currentText; charIdx++; }
                else { clearInterval(typeInterval); typingSpan.classList.remove('typing'); typingSpan.style.borderRight = 'none'; }
            }, 20);
        }
        function updateHologramLine(el) {
            const rect = el.getBoundingClientRect(); const startX = rect.left + rect.width / 2; const startY = rect.top; const tX = startX + 30; const tY = startY - 70;
            hologramTooltip.style.left = `${tX}px`; hologramTooltip.style.top = `${tY}px`; hologramLine.style.left = `${startX}px`; hologramLine.style.top = `${tY + 30}px`;
            hologramLine.style.height = `${startY - (tY + 30)}px`; hologramLine.style.transform = 'rotate(-15deg)';
        }
        function hideHologram() { cursor.style.width = '6px'; cursor.style.height = '6px'; clearInterval(typeInterval); hologramTooltip.classList.remove('active'); hologramLine.style.display = 'none'; }

                </div>
                <div class="content-grid">
                    ${pantsAtlas.map(item => `<button class="atlas-card ${item.id === selected.id ? 'active' : ''}" type="button" data-atlas-id="${escapeHTML(item.id)}">
                        <div class="atlas-card-title"><span>${escapeHTML(item.icon)}</span><strong>${escapeHTML(item.title)}</strong></div>
                        <p>${escapeHTML(item.subtitle)}</p>
                    </button>`).join('')}
                </div>
                <article class="atlas-detail-card">
                    <div class="atlas-detail-head">
                        <div class="atlas-detail-title"><span>${escapeHTML(selected.icon)}</span><strong>${escapeHTML(selected.title)}</strong></div>
                        <div class="atlas-detail-subtitle">${escapeHTML(selected.subtitle)}</div>
                    </div>
                    <div class="atlas-detail-body">
                        <div class="atlas-detail-row">
                            <div class="atlas-detail-label">SYMPTOM</div>
                            <div class="atlas-detail-text">${escapeHTML(selected.symptom)}</div>
                        </div>
                        <div class="atlas-detail-row">
                            <div class="atlas-detail-label">HACHANIA NOTE</div>
                            <div class="atlas-detail-text">${escapeHTML(selected.joke)}</div>
                        </div>
                        <div class="atlas-detail-row">
                            <div class="atlas-detail-label">NEEDED PANTS</div>
                            <div class="atlas-detail-text">${escapeHTML(selected.need)}</div>
                        </div>
                        <div class="atlas-detail-row">
                            <div class="atlas-detail-label">RELATED SHORTS</div>
                            <div class="atlas-detail-text">${escapeHTML(selected.shortNo)} · ${escapeHTML(selected.shortTitle)}</div>
                        </div>
                        <div class="atlas-detail-row">
                            <div class="atlas-detail-label">001/050 BUILD POINT</div>
                            <div class="atlas-detail-text">${escapeHTML(selected.buildPoint)}</div>
                        </div>
                        <div class="atlas-actions">
                            <button class="atlas-jump" type="button" data-section="shorts">관련 쇼츠 보기</button>
                            <button class="atlas-jump" type="button" data-section="progress">001/050 진행 보기</button>
                        </div>
                    </div>
                </article>
            `;
        }

        function renderPantsProgress() {
            return `<article class="progress-card">
                <div class="short-title">ㅁ ㅜ ㄹ ㅁ pants 001/050</div>
                <p class="short-copy">현재 상태: 샘플 기획과 착용 불편 관측을 연결하는 중. 완성품보다 먼저, 불편의 언어를 정리합니다.</p>
                <div class="progress-list">
                    ${pantsProgress.map(item => `<div class="progress-row">
                        <span class="progress-dot"></span>
                        <span>${escapeHTML(item.task)}</span>
                        <span class="progress-tag ${item.tag === '대기' ? 'wait' : ''}">${escapeHTML(item.tag)}</span>
                    </div>`).join('')}
                </div>
            </article>`;
        }

        function renderPantsNewsletter() {
            const saved = localStorage.getItem('muum_pants_email');
            return `<article class="newsletter-card">
                <div class="short-title">첫 번째 50벌이 지구에 도착하면 알려드릴게요.</div>
                <p class="short-copy">아직 결제도, 쇼핑몰도 아닙니다. 바지가 태어나는 과정을 관측하는 작은 알림입니다.</p>
                <input id="pants-newsletter-email" class="newsletter-input" type="email" inputmode="email" placeholder="이메일을 입력하세요" value="${saved ? escapeHTML(saved) : ''}">
                <button id="pants-newsletter-button" class="newsletter-button" type="button">바지의 탄생을 관측하기</button>
                <div id="pants-newsletter-note" class="newsletter-note">${saved ? '이미 관측자 명단에 조용히 기록되어 있어요.' : ''}</div>
            </article>`;
        }

        function savePantsNewsletter() {
            const input = document.getElementById('pants-newsletter-email');
            const note = document.getElementById('pants-newsletter-note');
            const email = (input.value || '').trim();
            if (!email || !email.includes('@')) {
                note.textContent = '이메일 모양이 조금 수상해요. @가 들어간 주소로 다시 적어주세요.';
                return;
            }
            localStorage.setItem('muum_pants_email', email);
            note.textContent = '기록 완료. 001/050의 첫 신호가 오면 이곳에서 다시 반짝일 거예요.';
            playChimeSound();
        }

        planetBackdrop.addEventListener('click', closePlanetPanel);
        planetPanelClose.addEventListener('click', closePlanetPanel);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && isPlanetPanelOpen) closePlanetPanel();
        });

        // --- ⏳ 4초 머묾 엔진 ---
        function getStorageNumber(key, fallback = 0) {
            const value = Number(localStorage.getItem(key));
            return Number.isFinite(value) ? value : fallback;
        }

        function setStorageNumber(key, value) {
            localStorage.setItem(key, String(value));
        }

        function registerUniverseVisit() {
            if (visitRegisteredThisPage) return;
            visitRegisteredThisPage = true;
            setStorageNumber('muum_visit_count', getStorageNumber('muum_visit_count') + 1);
        }

        function registerGalaxyAction(kind = 'touch') {
            setStorageNumber('muum_galaxy_action_count', getStorageNumber('muum_galaxy_action_count') + 1);
            localStorage.setItem('muum_last_action', kind);
        }

        function suspendIdleFor(ms = 120000) {
            externalLinkGuardUntil = Date.now() + ms;
            clearTimeout(idleTimer);
        }

        function isIdleSuppressed() {
            return isIdleTriggered || isPlanetPanelOpen || isSubGalaxyOpen || document.hidden || Date.now() < externalLinkGuardUntil;
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (!isUniverseActive || isIdleSuppressed()) return;
            idleTimer = setTimeout(triggerIdleState, 4000);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimeout(idleTimer);
            } else if (isUniverseActive && !isIdleTriggered) {
                suspendIdleFor(2500);
                setTimeout(resetIdleTimer, 2600);
            }
        });

        document.addEventListener('click', (event) => {
            const externalLink = event.target.closest && event.target.closest('a[target="_blank"], a[href^="http"]');
            if (externalLink) {
                registerGalaxyAction('external-link');
                suspendIdleFor(180000);
            }
        }, true);

        function triggerIdleState() {
            if (isIdleSuppressed()) return;
            isIdleTriggered = true; playChimeSound();
            
            const savedStarName = localStorage.getItem('muum_star_name');
            const firstTimeArea = document.getElementById('idle-first-time');
            const returningArea = document.getElementById('idle-returning');
            const returningMsg = document.getElementById('returning-msg');

            if (savedStarName) {
                firstTimeArea.classList.add('hidden');
                returningArea.classList.remove('hidden');
                returningMsg.textContent = `"또 오셨네요. 당신이 머물다 간 자리에 '${savedStarName}' 별이 여전히 고요히 빛나고 있어요."`;
            } else {
                firstTimeArea.classList.remove('hidden');
                returningArea.classList.add('hidden');
            }

            idleOverlay.classList.remove('pointer-events-none'); idleOverlay.style.opacity = '1';
        }

        saveStarBtn.addEventListener('click', () => {
            const starName = starNameInput.value.trim() || '무명의 안식별';
            localStorage.setItem('muum_star_name', starName);
            registerGalaxyAction('create-star');
            enterSubGalaxy(starName);
        });

        document.getElementById('enter-star-btn').addEventListener('click', () => {
            const savedStarName = localStorage.getItem('muum_star_name') || '무명의 안식별';
            registerGalaxyAction('enter-galaxy');
            enterSubGalaxy(savedStarName);
        });

        document.getElementById('reset-star-btn').addEventListener('click', () => {
            localStorage.removeItem('muum_star_name');
            triggerIdleState();
        });

        function enterSubGalaxy(name) {
            clearTimeout(idleTimer);
            isSubGalaxyOpen = true;
            idleOverlay.style.opacity = '0'; idleOverlay.classList.add('pointer-events-none');
            namedGalaxyTitle.textContent = `🪐 ${name} 은하계`;
            subGalaxyLayer.classList.remove('pointer-events-none'); subGalaxyLayer.style.opacity = '1';
            initSubGalaxyCanvas();
            updateGrowthStarState();
        }

        function getGrowthScore() {
            return getStorageNumber('muum_visit_count') + getStorageNumber('muum_galaxy_action_count');
        }

        function updateGrowthStarState() {
            const score = getGrowthScore();
            const touches = getStorageNumber('muum_growth_star_touches');
            const savedNote = localStorage.getItem('muum_private_star_note') || '';
            growthStar.classList.add('visible');
            growthStar.classList.remove('awake', 'sparked');
            galaxyNoteCard.classList.remove('active');
            galaxyNoteCard.setAttribute('aria-hidden', 'true');
            galaxyNoteInput.value = savedNote;
            galaxyNoteSaved.textContent = savedNote ? '지난번 한마디가 별 안에 접혀 있어요.' : '';

            if (score >= 10 || touches > 0) {
                growthStar.classList.add('awake');
                galaxyStatusCard.innerHTML = `당신의 별이 꿈틀거리고 있어요.<br>가만히 쓰다듬으면 잠깐 반짝입니다. <span style="color:rgba(250,204,21,.8)">${score}/10</span>`;
            } else {
                galaxyStatusCard.innerHTML = `아직 활성화되지 않은 별들이 천천히 움직이고 있어요.<br>방문과 관측이 쌓이면 작은 별 하나가 깨어납니다. <span style="color:rgba(125,211,252,.78)">${score}/10</span>`;
            }
        }

        function petGrowthStar() {
            registerGalaxyAction('pet-star');
            const touches = getStorageNumber('muum_growth_star_touches') + 1;
            setStorageNumber('muum_growth_star_touches', touches);
            growthStar.classList.add('sparked', 'awake');
            playChimeSound();
            setTimeout(() => growthStar.classList.remove('sparked'), 950);
            galaxyStatusCard.innerHTML = `별이 잠깐 반짝였어요.<br>아무도 못 보는 한마디를 별 안에 접어둘 수 있습니다.`;
            openGalaxyNoteCard();
        }

        function openGalaxyNoteCard() {
            galaxyNoteCard.classList.add('active');
            galaxyNoteCard.setAttribute('aria-hidden', 'false');
            setTimeout(() => galaxyNoteInput.focus(), 120);
        }

        function closeGalaxyNoteCard() {
            galaxyNoteCard.classList.remove('active');
            galaxyNoteCard.setAttribute('aria-hidden', 'true');
        }

        growthStar.addEventListener('click', petGrowthStar);
        growthStar.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                petGrowthStar();
            }
        });
        galaxyNoteSave.addEventListener('click', () => {
            const note = galaxyNoteInput.value.trim();
            if (note) {
                localStorage.setItem('muum_private_star_note', note);
                galaxyNoteSaved.textContent = '저장 완료. 이 말은 이 브라우저의 별 안에만 남아요.';
                registerGalaxyAction('save-note');
                playBlipSound();
            } else {
                localStorage.removeItem('muum_private_star_note');
                galaxyNoteSaved.textContent = '비웠어요. 별이 잠깐 조용해졌습니다.';
            }
            updateGrowthStarState();
            openGalaxyNoteCard();
        });
        galaxyNoteClose.addEventListener('click', closeGalaxyNoteCard);

        exitGalaxyBtn.addEventListener('click', () => {
            isSubGalaxyOpen = false;
            subGalaxyLayer.style.opacity = '0'; subGalaxyLayer.classList.add('pointer-events-none');
            growthStar.classList.remove('visible', 'awake', 'sparked');
            closeGalaxyNoteCard();
            starNameInput.value = ''; isIdleTriggered = false; resetIdleTimer();
        });

        // --- 백그라운드 별자리 ---
        const canvas = document.getElementById('stars-canvas'); const ctx = canvas.getContext('2d'); let stars = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); }
        function initStars() { stars = []; for (let i = 0; i < 100; i++) { stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.2, alpha: Math.random(), speed: 0.008 + Math.random() * 0.015 }); } }
        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#ffffff';
            stars.forEach(star => { star.alpha += star.speed; if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed; ctx.globalAlpha = Math.max(0, star.alpha); ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill(); });
            ctx.globalAlpha = 1.0; requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', () => { resizeCanvas(); if (isUniverseActive) buildOrbitSystem(); }); resizeCanvas(); animateStars();

        // --- 서브 갤럭시 코어 ---
        const subCanvas = document.getElementById('sub-galaxy-canvas'); const subCtx = subCanvas.getContext('2d'); let subStars = []; let subAnimationId;
        function initSubGalaxyCanvas() {
            subCanvas.width = window.innerWidth; subCanvas.height = window.innerHeight; subStars = [];
            for (let i = 0; i < 250; i++) { let angle = Math.random() * Math.PI * 2; let distance = 20 + Math.random() * 260; subStars.push({ angle: angle, distance: distance, size: 0.6 + Math.random() * 1.2, speed: 0.0015 + (260 - distance) * 0.00004, color: i % 3 === 0 ? 'rgba(147, 197, 253, r)' : (i % 3 === 1 ? 'rgba(196, 181, 253, r)' : 'rgba(167, 243, 254, r)') }); }
            animateSubGalaxy();
        }
        function animateSubGalaxy() {
            if (subGalaxyLayer.style.opacity === '0') { cancelAnimationFrame(subAnimationId); return; }
            subCtx.fillStyle = 'rgba(2, 2, 6, 0.2)'; subCtx.fillRect(0, 0, subCanvas.width, subCanvas.height); const cx = subCanvas.width / 2; const cy = subCanvas.height / 2;
            subStars.forEach(s => { s.angle += s.speed; let x = cx + Math.cos(s.angle) * s.distance; let y = cy + Math.sin(s.angle) * s.distance; let alpha = 0.3 + Math.abs(Math.sin(s.angle * 2)) * 0.7; subCtx.fillStyle = s.color.replace('r', alpha); subCtx.beginPath(); subCtx.arc(x, y, s.size, 0, Math.PI * 2); subCtx.fill(); });
            subAnimationId = requestAnimationFrame(animateSubGalaxy);
        }
    </script>
</body>
</html>
